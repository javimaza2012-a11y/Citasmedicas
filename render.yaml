services:
  - type: web
    name: agenda-medica-familia
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
    disk:
      name: agenda-datos
      mountPath: /data
      sizeGB: 1
